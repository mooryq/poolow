<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>네이버 로그인 처리 중...</title>
  <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js"></script>
</head>

<body>
  <p>🔐 로그인 처리 중입니다...</p>

<script>


window.onload = function () {

const naverLogin = new naver.LoginWithNaverId({
        clientId: "Fhq__Qo4pzeZka3tYTHt",
        callbackUrl: "https://127.0.0.1:5500/public/naver-callback.html",
        isPopup: false,
    });

    naverLogin.init();

    
      naverLogin.getLoginStatus(function (status) {
        if (status) {
          const userInfo = {
            name: naverLogin.user.getName(),
            email: naverLogin.user.getEmail(),
            id: naverLogin.user.getId(),
          };
          console.log("✅ 네이버 로그인 성공:", userInfo);

          localStorage.setItem("user", JSON.stringify(userInfo));
          window.location.href = "mypage.html";
        } else {
          console.error("❌ 네이버 로그인 실패");
          // window.location.href = "login.html";
        }
      });
  };

  </script>
  
</body>
</html>
